<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connect Four - Multi Round</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Connect Four - Best of 4 Rounds</h1>

  <div class="scoreboard">
    <p>🔴 Red Wins: <span id="red-score">0</span></p>
    <p>🟡 Yellow Wins: <span id="yellow-score">0</span></p>
    <p>🎯 Round: <span id="round-count">1</span> / 4</p>
  </div>

  <div id="board"></div>
  <p id="message">Red's Turn</p>

  <div class="buttons">
    <button onclick="nextGame()">Next Game</button>
    <button onclick="showResult()">Show Result</button>
    <button onclick="resetAll()">Full Reset</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
